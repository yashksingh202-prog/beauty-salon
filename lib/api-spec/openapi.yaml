openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI Story Adventure Game API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: users
  - name: stories
  - name: gameplay
  - name: rewards
  - name: leaderboard
  - name: referrals
  - name: premium
  - name: inventory
  - name: bosses
  - name: events
  - name: withdrawals
  - name: admin
  - name: analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── USERS ──────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMyProfile
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateMyProfile
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/me/stats:
    get:
      operationId: getMyStats
      tags: [users]
      summary: Get current user game stats
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  /users/me/sync:
    post:
      operationId: syncUser
      tags: [users]
      summary: Sync Clerk user into the game database (JIT provision)
      responses:
        "200":
          description: Synced user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ── STORIES / LEVELS ───────────────────────────────────────────────────────
  /stories:
    get:
      operationId: listStories
      tags: [stories]
      summary: List story levels
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated story list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryListResponse"
    post:
      operationId: createStory
      tags: [stories]
      summary: Create a new story level (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryInput"
      responses:
        "201":
          description: Created story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"

  /stories/{id}:
    get:
      operationId: getStory
      tags: [stories]
      summary: Get a story level by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Story details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
    patch:
      operationId: updateStory
      tags: [stories]
      summary: Update a story level (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryUpdate"
      responses:
        "200":
          description: Updated story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
    delete:
      operationId: deleteStory
      tags: [stories]
      summary: Delete a story level (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /stories/{id}/generate:
    post:
      operationId: generateStoryContent
      tags: [stories]
      summary: AI-generate story content for a level
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated story content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryContent"

  # ── GAMEPLAY ───────────────────────────────────────────────────────────────
  /gameplay/progress:
    get:
      operationId: getProgress
      tags: [gameplay]
      summary: Get current user progress across all levels
      responses:
        "200":
          description: User progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProgress"

  /gameplay/levels/{storyId}/start:
    post:
      operationId: startLevel
      tags: [gameplay]
      summary: Start playing a story level
      parameters:
        - name: storyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameSession"

  /gameplay/levels/{storyId}/complete:
    post:
      operationId: completeLevel
      tags: [gameplay]
      summary: Complete a story level and claim rewards
      parameters:
        - name: storyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LevelCompleteInput"
      responses:
        "200":
          description: Completion result with rewards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LevelCompleteResult"

  /gameplay/choices:
    post:
      operationId: makeChoice
      tags: [gameplay]
      summary: Make a story choice and get AI-generated continuation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChoiceInput"
      responses:
        "200":
          description: AI-generated story continuation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryContinuation"

  # ── REWARDS ────────────────────────────────────────────────────────────────
  /rewards/daily:
    get:
      operationId: getDailyRewardStatus
      tags: [rewards]
      summary: Get daily reward status and streak
      responses:
        "200":
          description: Daily reward status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRewardStatus"

  /rewards/daily/claim:
    post:
      operationId: claimDailyReward
      tags: [rewards]
      summary: Claim today's daily reward
      responses:
        "200":
          description: Claimed reward
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRewardClaim"

  /rewards/spin:
    get:
      operationId: getSpinStatus
      tags: [rewards]
      summary: Get lucky spin status (available spins, prizes)
      responses:
        "200":
          description: Spin status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpinStatus"

  /rewards/spin/execute:
    post:
      operationId: executeSpin
      tags: [rewards]
      summary: Execute a lucky spin
      responses:
        "200":
          description: Spin result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpinResult"

  /rewards/ad-watch:
    post:
      operationId: recordAdWatch
      tags: [rewards]
      summary: Record a rewarded ad watch and grant reward
      responses:
        "200":
          description: Ad reward granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdReward"

  # ── LEADERBOARD ────────────────────────────────────────────────────────────
  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get global leaderboard
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [alltime, weekly, monthly]
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"

  /leaderboard/me:
    get:
      operationId: getMyLeaderboardPosition
      tags: [leaderboard]
      summary: Get current user's leaderboard rank
      responses:
        "200":
          description: My rank info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardRank"

  # ── REFERRALS ──────────────────────────────────────────────────────────────
  /referrals/code:
    get:
      operationId: getReferralCode
      tags: [referrals]
      summary: Get current user's referral code
      responses:
        "200":
          description: Referral code and stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"

  /referrals/use:
    post:
      operationId: useReferralCode
      tags: [referrals]
      summary: Use a referral code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferralCodeInput"
      responses:
        "200":
          description: Referral applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralResult"

  # ── PREMIUM ────────────────────────────────────────────────────────────────
  /premium/status:
    get:
      operationId: getPremiumStatus
      tags: [premium]
      summary: Get current user's premium membership status
      responses:
        "200":
          description: Premium status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PremiumStatus"

  /premium/plans:
    get:
      operationId: getPremiumPlans
      tags: [premium]
      summary: Get available premium plans
      responses:
        "200":
          description: Premium plans list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PremiumPlan"

  # ── INVENTORY ──────────────────────────────────────────────────────────────
  /inventory:
    get:
      operationId: getInventory
      tags: [inventory]
      summary: Get current user's inventory
      responses:
        "200":
          description: Inventory items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResponse"

  /inventory/{itemId}/equip:
    post:
      operationId: equipItem
      tags: [inventory]
      summary: Equip an inventory item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Equipped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  # ── BOSS BATTLES ───────────────────────────────────────────────────────────
  /bosses:
    get:
      operationId: listBosses
      tags: [bosses]
      summary: List available boss battles
      responses:
        "200":
          description: Boss list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Boss"

  /bosses/{id}/battle:
    post:
      operationId: startBossBattle
      tags: [bosses]
      summary: Start a boss battle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Battle result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattleResult"

  # ── EVENTS ─────────────────────────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List active game events
      responses:
        "200":
          description: Events list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameEvent"

  /events/{id}/join:
    post:
      operationId: joinEvent
      tags: [events]
      summary: Join a game event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventParticipation"

  # ── WITHDRAWALS ────────────────────────────────────────────────────────────
  /withdrawals:
    get:
      operationId: listMyWithdrawals
      tags: [withdrawals]
      summary: List current user's withdrawal requests
      responses:
        "200":
          description: Withdrawals list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"
    post:
      operationId: createWithdrawal
      tags: [withdrawals]
      summary: Create a withdrawal request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalInput"
      responses:
        "201":
          description: Withdrawal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  # ── ADMIN ──────────────────────────────────────────────────────────────────
  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, banned, premium]
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"

  /admin/users/{id}:
    get:
      operationId: adminGetUser
      tags: [admin]
      summary: Get user details (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"

  /admin/users/{id}/ban:
    post:
      operationId: adminBanUser
      tags: [admin]
      summary: Ban a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BanInput"
      responses:
        "200":
          description: User banned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"

  /admin/users/{id}/unban:
    post:
      operationId: adminUnbanUser
      tags: [admin]
      summary: Unban a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User unbanned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"

  /admin/users/{id}/adjust-balance:
    post:
      operationId: adminAdjustBalance
      tags: [admin]
      summary: Adjust user coin/gem balance (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BalanceAdjustInput"
      responses:
        "200":
          description: Balance adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"

  /admin/withdrawals:
    get:
      operationId: adminListWithdrawals
      tags: [admin]
      summary: List all withdrawal requests (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: All withdrawals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminWithdrawalListResponse"

  /admin/withdrawals/{id}/approve:
    post:
      operationId: adminApproveWithdrawal
      tags: [admin]
      summary: Approve a withdrawal request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /admin/withdrawals/{id}/reject:
    post:
      operationId: adminRejectWithdrawal
      tags: [admin]
      summary: Reject a withdrawal request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /admin/rewards:
    get:
      operationId: adminListRewards
      tags: [admin]
      summary: List all reward configurations (admin)
      responses:
        "200":
          description: Rewards list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RewardConfig"
    post:
      operationId: adminCreateReward
      tags: [admin]
      summary: Create reward configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RewardConfigInput"
      responses:
        "201":
          description: Created reward config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardConfig"

  /admin/rewards/{id}:
    patch:
      operationId: adminUpdateReward
      tags: [admin]
      summary: Update reward configuration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RewardConfigUpdate"
      responses:
        "200":
          description: Updated reward config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardConfig"
    delete:
      operationId: adminDeleteReward
      tags: [admin]
      summary: Delete reward configuration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /admin/ads:
    get:
      operationId: adminListAds
      tags: [admin]
      summary: List ad configurations
      responses:
        "200":
          description: Ads list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdConfig"
    post:
      operationId: adminCreateAd
      tags: [admin]
      summary: Create ad configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdConfigInput"
      responses:
        "201":
          description: Created ad
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdConfig"

  /admin/ads/{id}:
    patch:
      operationId: adminUpdateAd
      tags: [admin]
      summary: Update ad configuration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdConfigUpdate"
      responses:
        "200":
          description: Updated ad config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdConfig"

  /admin/events:
    get:
      operationId: adminListEvents
      tags: [admin]
      summary: List all events (admin)
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameEvent"
    post:
      operationId: adminCreateEvent
      tags: [admin]
      summary: Create a game event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameEventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameEvent"

  # ── ANALYTICS ──────────────────────────────────────────────────────────────
  /analytics/dashboard:
    get:
      operationId: getAnalyticsDashboard
      tags: [analytics]
      summary: Get admin analytics dashboard summary
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsDashboard"

  /analytics/revenue:
    get:
      operationId: getRevenueAnalytics
      tags: [analytics]
      summary: Get revenue analytics over time
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
      responses:
        "200":
          description: Revenue data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueAnalytics"

  /analytics/users:
    get:
      operationId: getUserAnalytics
      tags: [analytics]
      summary: Get user growth and activity analytics
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
      responses:
        "200":
          description: User analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAnalytics"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    # ── USER ──────────────────────────────────────────────────────────────────
    UserProfile:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        username:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        coins:
          type: integer
        gems:
          type: integer
        level:
          type: integer
        xp:
          type: integer
        role:
          type: string
          enum: [user, moderator, admin, superadmin]
        isPremium:
          type: boolean
        isBanned:
          type: boolean
        referralCode:
          type: string
        createdAt:
          type: string
      required: [id, clerkId, username, email, coins, gems, level, xp, role, isPremium, isBanned, referralCode, createdAt]

    UserProfileUpdate:
      type: object
      properties:
        username:
          type: string
        avatarUrl:
          type: string

    UserStats:
      type: object
      properties:
        totalLevelsCompleted:
          type: integer
        totalStoriesRead:
          type: integer
        totalCoinsEarned:
          type: integer
        totalGemsEarned:
          type: integer
        currentStreak:
          type: integer
        longestStreak:
          type: integer
        bossesDefeated:
          type: integer
        eventsParticipated:
          type: integer
        totalSpins:
          type: integer
        referralCount:
          type: integer
      required: [totalLevelsCompleted, totalStoriesRead, totalCoinsEarned, totalGemsEarned, currentStreak, longestStreak, bossesDefeated, eventsParticipated, totalSpins, referralCount]

    # ── STORY ─────────────────────────────────────────────────────────────────
    Story:
      type: object
      properties:
        id:
          type: integer
        levelNumber:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard, legendary]
        coinsReward:
          type: integer
        gemsReward:
          type: integer
        xpReward:
          type: integer
        isPremium:
          type: boolean
        isPublished:
          type: boolean
        thumbnailUrl:
          type: ["string", "null"]
        estimatedMinutes:
          type: integer
        storyContent:
          type: ["string", "null"]
        choices:
          type: ["array", "null"]
          items:
